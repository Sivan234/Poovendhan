<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siva Kumar | Cyberpunk Galaxy Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:black;
color:#00ffff;
overflow-x:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
z-index:-1;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid #00ffff;
background:rgba(0,0,0,0.7);
}

nav a{
margin-left:20px;
text-decoration:none;
color:#00ffff;
}

.hero{
text-align:center;
padding:140px 20px;
}

section{
padding:60px;
text-align:center;
}

.skill{
width:300px;
margin:20px auto;
text-align:left;
}

.progress{
background:#111;
height:10px;
border-radius:10px;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
background:linear-gradient(90deg,#00ffff,#ff00ff);
}

/* Terminal */

.terminal{
width:80%;
max-width:700px;
margin:40px auto;
background:#000;
border:1px solid #00ffff;
padding:20px;
text-align:left;
}

.terminal-output{
height:150px;
overflow:auto;
margin-bottom:10px;
}

#terminalInput{
width:100%;
background:black;
border:none;
color:#00ffff;
font-family:monospace;
}

/* Chatbot */

.chatbot{
position:fixed;
bottom:20px;
right:20px;
width:260px;
background:#111;
border:1px solid #00ffff;
}

.chat-header{
background:#00ffff;
color:black;
padding:10px;
}

.chat-body{
height:120px;
overflow:auto;
padding:10px;
}

#chatInput{
width:100%;
padding:10px;
background:black;
border:none;
color:#00ffff;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h2>Siva Kumar</h2>

<nav>
<a href="#home">Home</a>
<a href="#skills">Skills</a>
<a href="#terminal">Terminal</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Cyberpunk Developer</h1>
<p>Ethical Hacker • Web Developer • Cyber Security Student</p>
</section>

<section id="skills">

<h2>Skills</h2>

<div class="skill">
<p>HTML</p>
<div class="progress"><span style="width:95%"></span></div>
</div>

<div class="skill">
<p>CSS</p>
<div class="progress"><span style="width:90%"></span></div>
</div>

<div class="skill">
<p>JavaScript</p>
<div class="progress"><span style="width:80%"></span></div>
</div>

<div class="skill">
<p>Cyber Security</p>
<div class="progress"><span style="width:75%"></span></div>
</div>

</section>

<section id="terminal">

<h2>Hacker Terminal</h2>

<div class="terminal">

<div class="terminal-output" id="terminalOutput">
Type <b>help</b> to see commands.
</div>

<input id="terminalInput" placeholder="Enter command...">

</div>

</section>


<!-- Chatbot -->

<div class="chatbot">

<div class="chat-header">AI Assistant</div>

<div class="chat-body" id="chatBody"></div>

<input id="chatInput" placeholder="Ask something...">

</div>


<script>

/* Terminal */

const terminalInput=document.getElementById("terminalInput");
const terminalOutput=document.getElementById("terminalOutput");

terminalInput.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let cmd=terminalInput.value.toLowerCase();

let response="";

if(cmd==="help")
response="Commands: about, skills, projects, clear";

else if(cmd==="about")
response="Siva Kumar: Cyber Security student and web developer.";

else if(cmd==="skills")
response="HTML, CSS, JavaScript, Cyber Security.";

else if(cmd==="projects")
response="Anime Website, Security Tool, Portfolio.";

else if(cmd==="clear"){
terminalOutput.innerHTML="";
terminalInput.value="";
return;
}

else
response="Unknown command.";

terminalOutput.innerHTML+="<br>> "+cmd+"<br>"+response;

terminalInput.value="";

}

});


/* Chatbot */

const chatInput=document.getElementById("chatInput");
const chatBody=document.getElementById("chatBody");

chatInput.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let text=chatInput.value;

let msg=document.createElement("div");
msg.textContent="You: "+text;
chatBody.appendChild(msg);

let reply=document.createElement("div");
reply.textContent="AI: Try using the hacker terminal!";
chatBody.appendChild(reply);

chatInput.value="";

}

});


/* THREE.JS GALAXY */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({
canvas:document.querySelector("#bg")
});

renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z=12;

/* Stars */

const starGeo=new THREE.BufferGeometry();

const starCount=6000;

const posArray=new Float32Array(starCount*3);

for(let i=0;i<starCount*3;i++){

posArray[i]=(Math.random()-0.5)*2000;

}

starGeo.setAttribute(
'position',
new THREE.BufferAttribute(posArray,3)
);

const starMaterial=new THREE.PointsMaterial({color:0xffffff});

const stars=new THREE.Points(starGeo,starMaterial);

scene.add(stars);


/* Planet */

const planetGeo=new THREE.SphereGeometry(2,32,32);

const planetMat=new THREE.MeshStandardMaterial({
color:0x2255ff
});

const planet=new THREE.Mesh(planetGeo,planetMat);

planet.position.x=5;

scene.add(planet);


/* Spaceship */

const shipGeo=new THREE.ConeGeometry(0.3,1,16);

const shipMat=new THREE.MeshStandardMaterial({
color:0xff0000
});

const ship=new THREE.Mesh(shipGeo,shipMat);

ship.position.set(-6,0,0);

scene.add(ship);


/* Light */

const light=new THREE.PointLight(0xffffff,1);

light.position.set(5,5,5);

scene.add(light);


/* Animation */

function animate(){

requestAnimationFrame(animate);

planet.rotation.y+=0.01;

stars.rotation.y+=0.0005;

/* spaceship movement */

ship.position.x+=0.02;

if(ship.position.x>8)
ship.position.x=-8;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
