<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siva Kumar | Galaxy Cyber Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:black;
color:#00ffff;
overflow-x:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
z-index:-1;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid #00ffff;
background:rgba(0,0,0,0.6);
}

.logo span{
color:#ff00ff;
}

nav a{
color:#00ffff;
margin-left:20px;
text-decoration:none;
}

.hero{
text-align:center;
padding:150px 20px;
}

section{
padding:60px;
text-align:center;
}

.skill{
width:300px;
margin:20px auto;
text-align:left;
}

.progress{
background:#111;
height:10px;
border-radius:10px;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
background:linear-gradient(90deg,#00ffff,#ff00ff);
}

.card{
border:1px solid #00ffff;
padding:30px;
margin:20px;
display:inline-block;
width:200px;
transition:0.3s;
}

.card:hover{
background:#00ffff;
color:black;
transform:scale(1.05);
}

input,textarea{
display:block;
margin:10px auto;
padding:10px;
width:250px;
background:#111;
border:1px solid #00ffff;
color:#00ffff;
}

button{
padding:10px 20px;
background:#00ffff;
border:none;
color:black;
cursor:pointer;
}

/* Chatbot */

.chatbot{
position:fixed;
bottom:20px;
right:20px;
width:260px;
background:#111;
border:1px solid #00ffff;
}

.chat-header{
background:#00ffff;
color:black;
padding:10px;
}

.chat-body{
height:150px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

#chatInput{
width:100%;
padding:10px;
border:none;
background:black;
color:#00ffff;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h2 class="logo">Siva<span>Kumar</span></h2>

<nav>
<a href="#home">Home</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Cyberpunk Developer</h1>
<p>Ethical Hacker • Web Developer • Cyber Security Student</p>
</section>

<section id="skills">

<h2>Skills</h2>

<div class="skill">
<p>HTML</p>
<div class="progress"><span style="width:95%"></span></div>
</div>

<div class="skill">
<p>CSS</p>
<div class="progress"><span style="width:90%"></span></div>
</div>

<div class="skill">
<p>JavaScript</p>
<div class="progress"><span style="width:80%"></span></div>
</div>

<div class="skill">
<p>Cyber Security</p>
<div class="progress"><span style="width:75%"></span></div>
</div>

</section>

<section id="projects">
<h2>Projects</h2>

<div class="card">Anime Website</div>
<div class="card">Cyber Security Tool</div>
<div class="card">Developer Portfolio</div>

</section>

<section id="contact">

<h2>Contact</h2>

<input placeholder="Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>

<button>Send</button>

</section>

<div class="chatbot">

<div class="chat-header">AI Assistant</div>

<div class="chat-body" id="chatBody"></div>

<input id="chatInput" placeholder="Ask something...">

</div>

<script>

/* Chatbot */

const input=document.getElementById("chatInput");
const chat=document.getElementById("chatBody");

input.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let text=input.value;

add("You: "+text);

let reply=bot(text);

setTimeout(()=>add("AI: "+reply),500);

input.value="";

}

});

function add(msg){

let div=document.createElement("div");
div.textContent=msg;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function bot(text){

text=text.toLowerCase();

if(text.includes("hello"))
return "Hello! Welcome to Siva Kumar's cyber portfolio.";

if(text.includes("skills"))
return "Siva knows HTML, CSS, JavaScript and Cyber Security.";

return "Ask me about skills or projects.";

}

/* Three.js Galaxy + Planet */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({
canvas:document.querySelector('#bg')
});

renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z=8;

/* Stars */

const starGeo=new THREE.BufferGeometry();
const starCount=5000;

const posArray=new Float32Array(starCount*3);

for(let i=0;i<starCount*3;i++){

posArray[i]=(Math.random()-0.5)*2000;

}

starGeo.setAttribute(
'position',
new THREE.BufferAttribute(posArray,3)
);

const starMaterial=new THREE.PointsMaterial({color:0xffffff});

const stars=new THREE.Points(starGeo,starMaterial);

scene.add(stars);

/* Planet */

const geometry=new THREE.SphereGeometry(2,32,32);

const material=new THREE.MeshStandardMaterial({
color:0x2266ff
});

const planet=new THREE.Mesh(geometry,material);

scene.add(planet);

/* Light */

const light=new THREE.PointLight(0xffffff,1);

light.position.set(5,5,5);

scene.add(light);

/* Animation */

function animate(){

requestAnimationFrame(animate);

planet.rotation.y+=0.01;

stars.rotation.y+=0.0005;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
