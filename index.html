<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siva Kumar | Cyberpunk Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:black;
color:#00ffff;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid #00ffff;
}

.logo span{
color:#ff00ff;
}

nav a{
color:#00ffff;
margin-left:20px;
text-decoration:none;
}

.hero{
text-align:center;
padding:150px 20px;
}

section{
padding:60px;
text-align:center;
}

.skill{
width:300px;
margin:20px auto;
text-align:left;
}

.progress{
background:#111;
height:10px;
border-radius:10px;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
background:linear-gradient(90deg,#00ffff,#ff00ff);
}

.card{
border:1px solid #00ffff;
padding:30px;
margin:20px;
display:inline-block;
width:200px;
transition:0.3s;
}

.card:hover{
background:#00ffff;
color:black;
}

input,textarea{
display:block;
margin:10px auto;
padding:10px;
width:250px;
background:#111;
border:1px solid #00ffff;
color:#00ffff;
}

button{
padding:10px 20px;
background:#00ffff;
border:none;
color:black;
cursor:pointer;
}

/* Chatbot */

.chatbot{
position:fixed;
bottom:20px;
right:20px;
width:260px;
background:#111;
border:1px solid #00ffff;
}

.chat-header{
background:#00ffff;
color:black;
padding:10px;
}

.chat-body{
height:150px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

#chatInput{
width:100%;
padding:10px;
border:none;
background:#000;
color:#00ffff;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<header>

<h2 class="logo">Siva<span>Kumar</span></h2>

<nav>
<a href="#home">Home</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

</header>


<section id="home" class="hero">

<h1>Cyber Security Developer</h1>
<p>Ethical Hacker | Web Developer</p>

</section>


<section id="skills">

<h2>My Skills</h2>

<div class="skill">
<p>HTML</p>
<div class="progress"><span style="width:95%"></span></div>
</div>

<div class="skill">
<p>CSS</p>
<div class="progress"><span style="width:90%"></span></div>
</div>

<div class="skill">
<p>JavaScript</p>
<div class="progress"><span style="width:80%"></span></div>
</div>

<div class="skill">
<p>Cyber Security</p>
<div class="progress"><span style="width:75%"></span></div>
</div>

</section>


<section id="projects">

<h2>Projects</h2>

<div class="card">Anime Website</div>
<div class="card">Cyber Security Tool</div>
<div class="card">Developer Portfolio</div>

</section>


<section id="contact">

<h2>Contact</h2>

<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>

<button>Send</button>

</section>


<!-- Chatbot -->

<div class="chatbot">

<div class="chat-header">AI Assistant</div>

<div class="chat-body" id="chatBody"></div>

<input id="chatInput" placeholder="Ask something..." />

</div>


<script>

/* Chatbot */

const chatInput=document.getElementById("chatInput");
const chatBody=document.getElementById("chatBody");

chatInput.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let text=chatInput.value;

addMessage("You: "+text);

let reply=getReply(text);

setTimeout(()=>{
addMessage("AI: "+reply);
},500);

chatInput.value="";

}

});

function addMessage(msg){

let div=document.createElement("div");
div.textContent=msg;

chatBody.appendChild(div);

chatBody.scrollTop=chatBody.scrollHeight;

}

function getReply(input){

input=input.toLowerCase();

if(input.includes("hello"))
return "Hello! Welcome to Siva Kumar's portfolio.";

if(input.includes("skills"))
return "Siva knows HTML, CSS, JavaScript and Cyber Security.";

if(input.includes("project"))
return "You can see the projects in the project section.";

return "Ask me about skills or projects.";

}


/* Matrix background */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01";
const fontSize=16;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ffff";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
